# Example using the "llm_judge" evaluator.
# A second LLM grades the responses — no need for exact expected answers.
# Great for open-ended questions where quality matters, not exact wording.

model:
  provider: ollama
  name: llama3.2:1b

evaluator: llm_judge

# Optional: specify a different (stronger) model as the judge.
# If omitted, the same model above is used as both subject and judge.
# judge:
#   provider: openai
#   name: gpt-4o

test_cases:
  - prompt: "Explain what photosynthesis is in 2-3 sentences."
    expected: "Photosynthesis is the process by which plants convert sunlight, water, and carbon dioxide into glucose and oxygen."
    tags: [science, open-ended]

  - prompt: "What are the three states of matter?"
    expected: "Solid, liquid, and gas"
    tags: [science, factual]

  - prompt: "Why is the sky blue? Keep it short."
    tags: [science, no-expected]
