# Example using the "contains" evaluator — more forgiving than exact match.
# The LLM can give a verbose answer as long as the expected text appears somewhere.

model:
  provider: ollama
  name: llama3.2:1b

evaluator: contains

test_cases:
  - prompt: "What is the capital of France?"
    expected: "Paris"
    tags: [geography]

  - prompt: "What is 2 + 2?"
    expected: "4"
    tags: [math]

  - prompt: "What is the chemical symbol for water?"
    expected: "H2O"
    tags: [chemistry]

  - prompt: "Who wrote Romeo and Juliet?"
    expected: "Shakespeare"
    tags: [literature]

  - prompt: "What planet is known as the Red Planet?"
    expected: "Mars"
    tags: [science]
